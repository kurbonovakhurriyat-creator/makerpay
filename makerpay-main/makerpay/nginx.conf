server {
    listen 80;
    server_name makerpay.uz www.makerpay.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name makerpay.uz www.makerpay.uz;

    ssl_certificate     /etc/letsencrypt/live/makerpay.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/makerpay.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Frontend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.makerpay.uz;

    ssl_certificate     /etc/letsencrypt/live/api.makerpay.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.makerpay.uz/privkey.pem;

    # Backend API
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }
}

limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
